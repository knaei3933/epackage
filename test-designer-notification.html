<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Designer Notification Test</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 20px; margin: 20px 0; }
    button { background: #10b981; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; }
    button:hover { background: #059669; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #result { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; }
    .success { background: #d1fae5; color: #065f46; }
    .error { background: #fee2e2; color: #991b1b; }
    pre { background: #f3f4f6; padding: 10px; border-radius: 4px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>📧 Designer Notification Test</h1>

  <div class="card">
    <h2>Order Information</h2>
    <p><strong>Order ID:</strong> 009b31e0-6014-40c7-8025-bc2b049169d0</p>
    <p><strong>Order Number:</strong> ORD-2026-MLWE7ZLV</p>
    <p><strong>Files:</strong> 2 PDF files uploaded</p>
    <p><strong>Designers:</strong> arwg22@gmail.com, admin@epackage-lab.com</p>

    <button onclick="sendNotification()" id="sendBtn">
      📧 Send Designer Notification
    </button>
  </div>

  <div id="result"></div>

  <script>
    const orderId = '009b31e0-6014-40c7-8025-bc2b049169d0';
    const apiUrl = `http://localhost:3002/api/admin/orders/${orderId}/notify-designer-data-upload`;

    async function sendNotification() {
      const btn = document.getElementById('sendBtn');
      const resultDiv = document.getElementById('result');

      btn.disabled = true;
      btn.textContent = '⏳ Sending...';
      resultDiv.style.display = 'none';

      try {
        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          credentials: 'include',
        });

        const data = await response.json();

        resultDiv.className = response.ok ? 'success' : 'error';
        resultDiv.innerHTML = `
          <h3>${response.ok ? '✅ Success!' : '❌ Failed'}</h3>
          <pre>${JSON.stringify(data, null, 2)}</pre>
        `;
        resultDiv.style.display = 'block';

      } catch (error) {
        resultDiv.className = 'error';
        resultDiv.innerHTML = `
          <h3>❌ Error</h3>
          <p>${error.message}</p>
        `;
        resultDiv.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = '📧 Send Designer Notification';
      }
    }
  </script>
</body>
</html>
